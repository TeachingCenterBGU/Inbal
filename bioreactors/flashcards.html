<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1R5ZEL12QJ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-1R5ZEL12QJ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כרטיסיות למידה - ד"ר ענבל צרפתי-ברעד</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], processEscapes: true },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root { 
            --primary: #1a3c5e; --success: #10b981; --error: #ef4444; --bg: #f4f7f9;
            --pink-bg: #fff5f7; --green-bg: #f0fdf4;
        }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; overflow-x: hidden; }
        .container { width: 95%; max-width: 600px; text-align: center; }
        
        #topic-title-main { color: var(--primary); margin-bottom: 15px; font-size: 1.8rem; }
        .score-counter { background: white; padding: 12px 25px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; font-weight: bold; color: var(--primary); font-size: 1.1rem; border: 1px solid #e2e8f0; display: inline-flex; align-items: center; gap: 8px; }
        .score-counter span { color: var(--success); font-size: 1.3rem; }
        #progress-bar-container { width: 100%; background: #e2e8f0; border-radius: 10px; height: 12px; margin-bottom: 25px; overflow: hidden; border: 1px solid #cbd5e1; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: width 0.5s ease; }

        .card-wrapper { perspective: 1000px; height: 380px; cursor: pointer; margin-bottom: 30px; width: 100%; position: relative; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s, opacity 0.5s, left 0.5s; transform-style: preserve-3d; box-shadow: 0 12px 35px rgba(0,0,0,0.1); border-radius: 20px; left: 0; }
        .card.flipped { transform: rotateY(180deg); }
        
        /* שינוי קריטי: פריסה מלמעלה למטה וריווח בין שורות */
        .card-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; flex-direction: column; /* מסדר תוכן לאורך */
            align-items: center; justify-content: center; 
            padding: 35px; box-sizing: border-box; border-radius: 20px; 
            font-size: 1.4rem; border: 1px solid #e2e8f0; overflow-y: auto;
            line-height: 1.6; /* מוסיף ריווח בין שורות טקסט */
        }
        
        /* הוספת ריווח מסביב למשוואות */
        mjx-container { 
            margin: 15px 0 !important; 
            display: block !important;
            font-size: 115% !important;
        }

        .card-front { background-color: var(--pink-bg); color: #333; }
        .card-back { transform: rotateY(180deg); background-color: var(--green-bg); color: var(--primary); border-color: var(--success); }

        .btn-row { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .btn { padding: 15px 30px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.1rem; min-width: 150px; }
        .btn-nav { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-error { background: var(--error); }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        .slide-out { left: 100vw !important; opacity: 0 !important; }
        footer { margin-top: auto; padding: 20px; font-size: 0.85rem; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container" id="quiz-area">
    <div class="score-counter" id="score-display">הצלחת <span>0</span> מתוך 0</div>
    <h1 id="topic-title-main">טוען...</h1>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    <div class="card-wrapper"><div id="card" class="card" onclick="flipCard()"><div class="card-face card-front" id="frontText"></div><div class="card-face card-back" id="backText"></div></div></div>
    <div class="btn-row" id="feedback-controls"><button class="btn btn-error" onclick="handleResult(false)">❌ טעיתי</button><button class="btn btn-success" onclick="handleResult(true)">✅ הצלחתי!</button></div>
</div>
<div class="container congrats" id="finish-area"><h1>🏆</h1><h2>כל הכבוד!</h2><p>סיימת את כל הכרטיסיות בסשן הזה.</p><button class="btn btn-nav" onclick="location.reload()">תרגול חוזר</button></div>
<script>
    let masterList = [], activePool = [], currentIndex = 0, isAnimating = false;
    async function loadData() {
        const params = new URLSearchParams(window.location.search);
        const topic = params.get('topic') || 'basic_kinetics';
        try {
            const response = await fetch(`./${topic}.json`);
            const data = await response.json();
            masterList = data.cards || data;
            document.getElementById('topic-title-main').innerText = data.quizTitle || topic.replace('_', ' ');
            activePool = [...masterList]; shuffle(activePool); showCard();
        } catch (e) { document.getElementById('frontText').innerText = "שגיאה בטעינת הקובץ."; }
    }
    function showCard() {
        if (activePool.length === 0) { document.getElementById('quiz-area').style.display = 'none'; document.getElementById('finish-area').style.display = 'block'; return; }
        const card = document.getElementById('card');
        card.classList.remove('flipped');
        document.getElementById('frontText').innerHTML = activePool[currentIndex].q;
        document.getElementById('backText').innerHTML = activePool[currentIndex].a;
        document.getElementById('score-display').innerHTML = `הצלחת <span>${masterList.length - activePool.length}</span> מתוך ${masterList.length}`;
        const percent = ((masterList.length - activePool.length) / masterList.length) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
        if (window.MathJax) MathJax.typesetPromise();
    }
    function handleResult(isSuccess) {
        if (isAnimating) return; isAnimating = true;
        const card = document.getElementById('card');
        if (isSuccess) {
            card.classList.add('slide-out');
            setTimeout(() => { activePool.splice(currentIndex, 1); if (currentIndex >= activePool.length) currentIndex = 0; card.classList.remove('slide-out'); showCard(); isAnimating = false; }, 500);
        } else {
            card.classList.add('shake');
            setTimeout(() => { card.classList.remove('shake'); currentIndex = (currentIndex + 1) % activePool.length; showCard(); isAnimating = false; }, 400);
        }
    }
    function flipCard() { if(!isAnimating) document.getElementById('card').classList.toggle('flipped'); }
    function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }
    window.onload = loadData;
</script>
</body>
</html>
