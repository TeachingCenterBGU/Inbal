<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כרטיסיות למידה - ד"ר ענבל צרפתי-ברעד</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], processEscapes: true },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root { 
            --primary: #1a3c5e; --success: #10b981; --error: #ef4444; --bg: #f4f7f9;
            --pink-bg: #fff0f3; /* ורוד בהיר */
            --green-bg: #f0fff4; /* ירוק בהיר */
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 95%; max-width: 600px; text-align: center; }
        
        .score-counter { background: white; padding: 12px 25px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; font-weight: bold; color: var(--primary); font-size: 1.1rem; border: 1px solid #e2e8f0; }
        .score-counter span { color: var(--success); }

        .mode-selector { margin-bottom: 20px; background: #e2e8f0; padding: 5px; border-radius: 12px; display: inline-flex; gap: 5px; }
        .mode-btn { padding: 8px 18px; border: none; border-radius: 10px; cursor: pointer; background: transparent; font-weight: bold; transition: 0.3s; }
        .mode-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .card-wrapper { perspective: 1000px; height: 320px; cursor: pointer; margin-bottom: 25px; width: 100%; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card.flipped { transform: rotateY(180deg); }
        
        /* אנימציית רעידה */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; border-radius: 20px; font-size: 1.5rem; border: 2px solid #e2e8f0; }
        .card-front { background-color: var(--pink-bg); color: #333; }
        .card-back { transform: rotateY(180deg); background-color: var(--green-bg); color: var(--primary); border-color: var(--success); }

        .btn-row { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 14px 28px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.1rem; min-width: 140px; }
        .btn-nav { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-error { background: var(--error); }
        .btn:disabled { opacity: 0.3; }

        .congrats { display: none; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container" id="quiz-area">
    <div class="score-counter" id="score-display">הצלחת <span>0</span> מתוך 0</div>

    <div class="mode-selector">
        <button class="mode-btn" id="browseModeBtn" onclick="setMode('browse')">מצב עיון</button>
        <button class="mode-btn active" id="practiceModeBtn" onclick="setMode('practice')">מצב תרגול</button>
    </div>

    <div class="card-wrapper" onclick="flipCard()">
        <div id="card" class="card">
            <div class="card-face card-front" id="frontText"></div>
            <div class="card-face card-back" id="backText"></div>
        </div>
    </div>

    <div class="btn-row" id="nav-controls" style="display: none;">
        <button class="btn btn-nav" id="prevBtn" onclick="navigate(-1)">קודם</button>
        <button class="btn btn-nav" id="nextBtn" onclick="navigate(1)">הבא</button>
    </div>

    <div class="btn-row" id="feedback-controls">
        <button class="btn btn-error" onclick="handleResult(false)">❌ טעיתי</button>
        <button class="btn btn-success" onclick="handleResult(true)">✅ הצלחתי!</button>
    </div>
</div>

<div class="container congrats" id="finish-area">
    <h1>🎉 כל הכבוד!</h1>
    <p>השלמת את כל הכרטיסיות בסשן הזה.</p>
    <button class="btn btn-nav" onclick="location.reload()">תרגול חוזר</button>
</div>

<script>
    let masterList = [];
    let activePool = [];
    let currentIndex = 0;
    let currentMode = 'practice';

    async function loadData() {
        const params = new URLSearchParams(window.location.search);
        const topic = params.get('topic') || 'basic_kinetics';
        try {
            const response = await fetch(`./${topic}.json`);
            masterList = await response.json();
            setMode('practice');
        } catch (e) { console.error("Error loading JSON"); }
    }

    function setMode(mode) {
        currentMode = mode;
        currentIndex = 0;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode + 'ModeBtn').classList.add('active');
        activePool = [...masterList];
        
        if (mode === 'browse') {
            document.getElementById('nav-controls').style.display = 'flex';
            document.getElementById('feedback-controls').style.display = 'none';
            document.getElementById('score-display').style.visibility = 'hidden';
        } else {
            shuffle(activePool);
            document.getElementById('nav-controls').style.display = 'none';
            document.getElementById('feedback-controls').style.display = 'flex';
            document.getElementById('score-display').style.visibility = 'visible';
        }
        showCard();
    }

    function showCard() {
        if (activePool.length === 0 && currentMode === 'practice') {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('finish-area').style.display = 'block';
            return;
        }
        const card = document.getElementById('card');
        card.classList.remove('flipped', 'shake'); // הסרת רעידה קודמת
        document.getElementById('frontText').innerHTML = activePool[currentIndex].q;
        document.getElementById('backText').innerHTML = activePool[currentIndex].a;
        
        if (currentMode === 'browse') {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === activePool.length - 1;
        } else {
            document.getElementById('score-display').innerHTML = `הצלחת <span>${masterList.length - activePool.length}</span> מתוך ${masterList.length}`;
        }
        if (window.MathJax) MathJax.typesetPromise();
    }

    function handleResult(isSuccess) {
        if (isSuccess) {
            activePool.splice(currentIndex, 1);
        } else {
            // אפקט רעידה לכרטיסייה
            const cardElement = document.getElementById('card');
            cardElement.classList.add('shake');
            setTimeout(() => cardElement.classList.remove('shake'), 300);
            currentIndex++;
        }
        if (currentIndex >= activePool.length) {
            currentIndex = 0;
            if (currentMode === 'practice') shuffle(activePool);
        }
        showCard();
    }

    function navigate(step) { currentIndex += step; showCard(); }
    function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    window.onload = loadData;
</script>
</body>
</html>
